<svg width="540" height="540" viewBox="0 0 540 540" xmlns="http://www.w3.org/2000/svg">
  <style>
    * {font-family:monospace; font-size:24px;}
    text {fill:black;}
    rect {fill:none; stroke:black; stroke-width:4;}
    circle {fill:none; stroke:black; stroke-width:4;}
    line {stroke:black; stroke-width:4;}
    .label {font-size:20px;}
  </style>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="black" />
    </marker>
  </defs>

  <text x="130" y="40" font-weight="bold">Deadlock Cycle</text>

  <!-- Thread 1 -->
  <rect x="180" y="70" width="180" height="60" />
  <text x="195" y="110">Thread 1</text>

  <!-- Account B -->
  <circle cx="440" cy="270" r="70" />
  <text x="395" y="265">Account</text>
  <text x="430" y="295">B</text>

  <!-- Thread 2 -->
  <rect x="180" y="410" width="180" height="60" />
  <text x="195" y="450">Thread 2</text>

  <!-- Account A -->
  <circle cx="100" cy="270" r="70" />
  <text x="55" y="265">Account</text>
  <text x="90" y="295">A</text>

  <!-- Edges -->
  <!-- T1 waits B -->
  <line x1="365" y1="100" x2="435" y2="195" marker-end="url(#arrow)" />
  <text x="405" y="145" class="label">WAITS</text>

  <!-- B held by T2 -->
  <line x1="435" y1="345" x2="365" y2="440" marker-end="url(#arrow)" />
  <text x="405" y="405" class="label">HELD</text>

  <!-- T2 waits A -->
  <line x1="175" y1="440" x2="105" y2="345" marker-end="url(#arrow)" />
  <text x="55" y="405" class="label">WAITS</text>

  <!-- A held by T1 -->
  <line x1="105" y1="195" x2="175" y2="100" marker-end="url(#arrow)" />
  <text x="55" y="145" class="label">HELD</text>

  <text x="180" y="520" font-weight="bold">CYCLE DETECTED</text>
</svg>